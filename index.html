<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>IP Opener - Force Firefox</title>
    <style>
        body { font-family: sans-serif; background: #0f172a; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .card { background: #1e293b; padding: 30px; border-radius: 15px; border: 1px solid #334155; text-align: center; width: 350px; }
        input { width: 100%; padding: 12px; margin-bottom: 20px; border-radius: 6px; border: 2px solid #3b82f6; background: #0f172a; color: #fff; font-size: 1.1rem; text-align: center; box-sizing: border-box; }
        .grid { display: grid; grid-template-columns: 1fr; gap: 10px; }
        
        /* Botão estilizado */
        .btn-trigger {
            background: #3b82f6; color: white; border: none; padding: 15px; border-radius: 8px;
            cursor: pointer; font-weight: bold; font-size: 14px; transition: 0.2s; width: 100%;
            margin-bottom: 5px;
        }
        .btn-trigger:hover { background: #2563eb; }
        .desc { font-size: 10px; color: #94a3b8; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="card">
    <h3>IP Opener (Force Mode)</h3>
    <input type="text" id="ipInput" placeholder="Digite o IP aqui">
    
    <div class="grid">
        <div>
            <div class="desc">Abre as 4 variantes em sequência</div>
            <button onclick="forçarAbertura()" class="btn-trigger">ABRIR TUDO (FORCE)</button>
        </div>
    </div>
</div>

<form id="ghostForm" target="_blank" method="GET" style="display:none;"></form>

<script>
    function forçarAbertura() {
        let ip = document.getElementById('ipInput').value.trim();
        ip = ip.replace(/^(https?:\/\/)/, "");
        
        if (ip.length < 7) return alert("Digite um IP válido");

        const variantes = [
            "http://" + ip,
            "https://" + ip,
            "https://" + ip + ":8082",
            "http://" + ip + ":8082"
        ];

        const form = document.getElementById('ghostForm');

        variantes.forEach((url, index) => {
            setTimeout(() => {
                // Em vez de window.open, mudamos a ação do formulário e "submetemos"
                form.action = url;
                form.submit();
            }, index * 600); // O delay é essencial para o Firefox não ignorar os envios
        });
    }
</script>

</body>
</html>
