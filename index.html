<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>IP Opener - Universal Version</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #0f172a; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: #1e293b; padding: 30px; border-radius: 12px; width: 450px; text-align: center; border: 1px solid #334155; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        h3 { margin-top: 0; color: #3b82f6; letter-spacing: 1px; }
        input { width: 100%; padding: 12px; margin-bottom: 20px; border-radius: 6px; border: 2px solid #334155; background: #0f172a; color: white; box-sizing: border-box; font-size: 16px; text-align: center; }
        input:focus { border-color: #3b82f6; outline: none; }
        
        .grid-botoes { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 10px; }
        
        /* Estilizando o link para parecer um botão */
        .btn-link { 
            display: block;
            background: #334155; 
            color: #94a3b8; 
            padding: 15px 5px; 
            border-radius: 6px; 
            font-size: 0.75rem; 
            font-weight: bold; 
            text-decoration: none; 
            border: 1px solid transparent;
            transition: all 0.2s;
            pointer-events: none; /* Desativa o clique até ter um IP */
            opacity: 0.5;
        }

        /* Quando o IP é válido, os botões "acendem" */
        .active { 
            background: #3b82f6; 
            color: white; 
            pointer-events: auto; 
            opacity: 1; 
            border-bottom: 3px solid #1d4ed8;
        }
        .active:hover { background: #2563eb; transform: translateY(-2px); }
        .active:active { transform: translateY(0); border-bottom: none; }

        .btn-link.https.active { background: #8b5cf6; border-color: #7c3aed; }
        .btn-link.port.active { background: #f59e0b; border-color: #d97706; }
        
        .instrucao { font-size: 0.8rem; color: #64748b; margin-top: 15px; }
    </style>
</head>
<body>

<div class="card">
    <h3>IP Opener Universal</h3>
    <input type="text" id="ipInput" placeholder="Cole o IP (Ex: 192.168.0.1)" oninput="atualizarLinks()">
    
    <div class="grid-botoes">
        <a id="link1" target="_blank" class="btn-link">HTTP Padrão</a>
        <a id="link2" target="_blank" class="btn-link https">HTTPS</a>
        <a id="link3" target="_blank" class="btn-link port">HTTPS :8082</a>
        <a id="link4" target="_blank" class="btn-link port">HTTP :8082</a>
    </div>
    
    <p class="instrucao">No Mozilla, clique em cada botão após inserir o IP.</p>
</div>

<script>
    function atualizarLinks() {
        let ip = document.getElementById('ipInput').value.trim();
        // Remove qualquer protocolo que venha no "colar"
        ip = ip.replace(/^(https?:\/\/)/, "");
        
        const botoes = document.querySelectorAll('.btn-link');
        
        if (ip.length >= 7) { // Comprimento mínimo de um IP (ex: 1.1.1.1)
            botoes.forEach(btn => btn.classList.add('active'));

            document.getElementById('link1').href = "http://" + ip;
            document.getElementById('link2').href = "https://" + ip;
            document.getElementById('link3').href = "https://" + ip + ":8082";
            document.getElementById('link4').href = "http://" + ip + ":8082";
        } else {
            botoes.forEach(btn => {
                btn.classList.remove('active');
                btn.href = "#";
            });
        }
    }
</script>

</body>
</html>
