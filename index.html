<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>IP Opener Pro</title>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: white; text-align: center; padding-top: 50px; }
        .box { background: #333; padding: 30px; border-radius: 15px; display: inline-block; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        input { padding: 12px; width: 250px; border-radius: 5px; border: none; font-size: 16px; }
        button { padding: 12px 25px; background: #28a745; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        button:hover { background: #218838; }
        .aviso { color: #ffc107; margin-top: 20px; font-size: 13px; max-width: 350px; }
    </style>
</head>
<body>

<div class="box">
    <h2>Abrir 4 Abas de IP</h2>
    <input type="text" id="ipInput" placeholder="Cole o IP aqui (ex: 192.168.0.1)">
    <br>
    <button onclick="abrirTudo()">ABRIR ABASagora</button>
    <div class="aviso">
        ⚠️ <b>IMPORTANTE:</b> Após clicar, verifique o aviso de "Pop-up Bloqueado" no topo do navegador e clique em <b>PERMITIR</b>.
    </div>
</div>

<script>
    function abrirTudo() {
        let rawIp = document.getElementById('ipInput').value.trim();
        
        // Remove http:// ou https:// se o usuário colar junto
        let ip = rawIp.replace(/^(https?:\/\/)/, "");

        if (!ip) {
            alert("Cole um IP válido!");
            return;
        }

        // Variantes conforme seu pedido
        const links = [
            "http://" + ip,                // Somente o IP
            "https://" + ip,               // HTTPS + IP
            "https://" + ip + ":8082",     // HTTPS + IP + 8082
            "http://" + ip + ":8082"       // IP + 8082 (Somente 8082)
        ];

        // Tenta abrir as janelas
        links.forEach((url, index) => {
            // O pequeno 'timeout' ajuda alguns navegadores a não travarem
            setTimeout(() => {
                window.open(url, '_blank');
            }, index * 200); 
        });
    }
</script>

</body>
</html>
