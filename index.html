<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-IP Opener</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0f172a; color: #f8fafc; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: #1e293b; padding: 2rem; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); width: 100%; max-width: 400px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 15px 0; border-radius: 6px; border: 1px solid #334155; background: #0f172a; color: white; font-size: 1rem; box-sizing: border-box; }
        button { width: 100%; background: #3b82f6; color: white; border: none; padding: 12px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 1rem; transition: background 0.3s; }
        button:hover { background: #2563eb; }
        .info { font-size: 0.8rem; color: #94a3b8; margin-top: 15px; }
    </style>
</head>
<body>

<div class="card">
    <h2>IP Multi-Opener</h2>
    <p>Insira o IP para abrir as 4 variações:</p>
    <input type="text" id="ipInput" placeholder="Ex: 192.168.0.1" onkeypress="if(event.key==='Enter') abrirAbas()">
    <button onclick="abrirAbas()">Abrir 4 Abas</button>
    <p class="info">⚠️ Certifique-se de <b>permitir pop-ups</b> neste site.</p>
</div>

<script>
    function abrirAbas() {
        let ip = document.getElementById('ipInput').value.trim();
        
        // Remove protocolos se o usuário já tiver colado com eles
        ip = ip.replace(/^https?:\/\//, '');

        if (!ip) {
            alert("Por favor, digite um IP válido.");
            return;
        }

        const variacoes = [
            `http://${ip}`,             // Somente o IP (navegador assume http)
            `https://${ip}`,            // Com HTTPS
            `https://${ip}:8082`,       // HTTPS + Porta 8082
            `http://${ip}:8082`         // IP + Porta 8082 (sem https forçado)
        ];

        variacoes.forEach(url => {
            window.open(url, '_blank');
        });
    }
</script>

</body>
</html>
